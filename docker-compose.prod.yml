services:
  db:
    image: postgres:16
    container_name: app-clinica-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GHCR_OWNER}/app-clinica-backend:${BACKEND_IMAGE_TAG}
    container_name: app-clinica-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.app-clinica-api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.app-clinica-api.entrypoints=websecure"
      - "traefik.http.routers.app-clinica-api.tls=true"
      - "traefik.http.services.app-clinica-api.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 8

  frontend:
    image: ghcr.io/${GHCR_OWNER}/app-clinica-frontend:${FRONTEND_IMAGE_TAG}
    container_name: app-clinica-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.app-clinica-web.rule=Host(`${WEB_HOST}`)"
      - "traefik.http.routers.app-clinica-web.entrypoints=websecure"
      - "traefik.http.routers.app-clinica-web.tls=true"
      - "traefik.http.services.app-clinica-web.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true
